<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Login Overlay -->
  <div class="login-overlay active" id="loginOverlay">
    <div class="login-modal">
      <div class="login-header">
        <div class="logo-icon" style="font-size: 3rem; margin-bottom: 0.5rem;">🤖</div>
        <h2>Welcome</h2>
        <p>Enter your username to access your chats</p>
      </div>
      <div class="login-form">
        <input type="text" id="usernameInput" placeholder="Enter your username" autocomplete="off" />
        <button class="btn-login" onclick="handleLogin()">Start Chatting</button>
      </div>
    </div>
  </div>

  <div class="app-container" id="appContainer" style="display: none;">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="btn-new-chat" onclick="startNewChat()">
          <span>+</span> New Chat
        </button>
      </div>
      <div class="sidebar-history-label">Recents</div>
      <div class="sidebar-history" id="sidebarHistory">
        <!-- History items will be injected here -->
      </div>
      <div class="sidebar-footer">
        <p>© 2026 AI Assistant</p>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header>
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18" />
            </svg>
          </button>
          <div class="logo">
            <div class="logo-icon">🤖</div>
            <div class="logo-text">
              <h1>AI Assistant</h1>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn-logout" id="logoutBtn" onclick="handleLogout()" title="Logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
          <button class="btn-voice-toggle active" id="voiceToggleBtn" onclick="toggleAIVoice()" title="Toggle AI Voice">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
          </button>
          <div class="status-dot" title="Online"></div>
          <button class="btn-clear" onclick="clearChat()">🗑 Clear</button>
        </div>
      </header>

      <!-- Chat Area -->
      <div class="chat-wrapper" id="chatBox">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">✨</div>
          <h2>Hello! I'm your AI Assistant</h2>
          <p>Ask me anything — I'm here to help you with any topic!</p>
          <div class="suggestions">
            <button class="suggestion-chip" onclick="sendSuggestion('What is Python programming?')">🐍 What is Python?</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Tell me a fun science fact')">🔬 Science fact</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Tell me a short story')">📖 Tell me a story</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Give me tips to reduce stress')">😌 Stress relief tips</button>
            <button class="suggestion-chip" onclick="sendSuggestion('What is artificial intelligence?')">🧠 What is AI?</button>
            <button class="suggestion-chip" onclick="sendSuggestion('Give me some healthy breakfast ideas')">🥗 Breakfast ideas</button>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
          <button class="mic-btn" id="micBtn" onclick="toggleRecording()" title="Speak">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
            </svg>
          </button>
        </div>
        <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Music Player UI -->
  <div class="music-player disabled" id="musicPlayer">
    <div class="music-info">
      <div class="music-icon" id="musicIcon">🎵</div>
      <div class="music-details">
        <p class="music-title" id="musicTitle">Searching music...</p>
        <p class="music-status">YouTube Music</p>
      </div>
    </div>
    <div class="music-controls">
      <button class="music-btn" onclick="toggleMusic()" id="musicTogglePlayBtn" title="Play/Pause">
        <svg viewBox="0 0 24 24" id="playPauseIcon" fill="currentColor">
          <path d="M8 5v14l11-7z" id="playIcon"/>
        </svg>
      </button>
      <button class="music-btn close-btn" onclick="closeMusic()" title="Close Player">✖</button>
    </div>
    <!-- Hidden YT Player -->
    <div id="ytplayer" style="position:absolute; width:0; height:0; top:-9999px; left:-9999px;"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>

</html>
